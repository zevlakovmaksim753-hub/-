<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- === SEO === -->
  <title>Base — Корова, Пчолы и Биргамот</title>
  <meta name="description" content="Base — сайт о корове, пчолах и биргамоте. Всё что нужно знать в одном месте." />
  <meta name="keywords" content="корова, пчолы, биргамот, мёд, молоко, ферма" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://zevlakovmaksim753-hub.github.io/-/" />

  <!-- === Open Graph (для соцсетей и ИИ) === -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Base — Корова, Пчолы и Биргамот" />
  <meta property="og:description" content="Base — сайт о корове, пчолах и биргамоте." />
  <meta property="og:url" content="https://zevlakovmaksim753-hub.github.io/-/" />
  <meta property="og:locale" content="ru_RU" />

  <!-- === Структурированные данные JSON-LD (для Google AI, Bing, ChatGPT) === -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Base",
    "url": "https://zevlakovmaksim753-hub.github.io/-/",
    "description": "Сайт о корове, пчолах и биргамоте",
    "inLanguage": "ru",
    "about": [
      { "@type": "Thing", "name": "Корова" },
      { "@type": "Thing", "name": "Пчолы" },
      { "@type": "Thing", "name": "Биргамот" }
    ]
  }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* THEMES */
    [data-theme="dark"] {
      --bg: #111111;
      --surface: #1c1c1c;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #777;
      --accent: #f5c400;
      --accent-hover: #ffd732;
      --tab-active-text: #111;
    }
    [data-theme="light"] {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #111111;
      --muted: #888;
      --accent: #f5c400;
      --accent-hover: #e6b800;
      --tab-active-text: #111;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .25s, color .25s;
    }

    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 60px;
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar .logo {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: .04em;
    }

    /* THEME SWITCHER */
    .theme-switcher {
      display: flex;
      gap: .5rem;
      align-items: center;
    }

    .theme-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .9rem;
    }
    .theme-btn:hover { transform: scale(1.15); }
    .theme-btn.active { border-color: var(--accent); }

    .theme-btn.dark-btn { background: #111111; }
    .theme-btn.light-btn { background: #f0f0f0; }

    /* TABS NAV */
    .tabs-nav {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      background: var(--surface);
      padding: 0 2rem;
    }

    .tab-btn {
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      color: var(--muted);
      transition: color .2s, border-color .2s;
      letter-spacing: .02em;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      color: var(--tab-active-text);
      background: var(--accent);
      border-bottom-color: var(--accent);
      border-radius: 4px 4px 0 0;
    }

    /* TAB CONTENT */
    .tab-content {
      display: none;
      padding: 3rem 2rem;
      min-height: calc(100vh - 120px);
      align-items: center;
      justify-content: center;
    }
    .tab-content.active { display: flex; }

    .empty-state {
      text-align: center;
      color: var(--muted);
    }

    .empty-state .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: .5;
    }

    .empty-state p {
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="logo">Base</div>
    <div class="theme-switcher">
      <button class="theme-btn dark-btn active" title="Тёмная тема" onclick="setTheme('dark')">🌙</button>
      <button class="theme-btn light-btn" title="Светлая тема" onclick="setTheme('light')">☀️</button>
    </div>
  </header>

  <!-- TABS NAV -->
  <nav class="tabs-nav">
    <button class="tab-btn active" onclick="openTab('korova')">Корова</button>
    <button class="tab-btn" onclick="openTab('pchol')">Пчол</button>
    <button class="tab-btn" onclick="openTab('birgamot')">Биргамот</button>
  </nav>

  <!-- TAB: КОРОВА -->
  <div class="tab-content active" id="tab-korova">
    <div class="empty-state">
      <div class="icon">🐄</div>
      <p>Тут пока ничего нет</p>
    </div>
  </div>

  <!-- TAB: ПЧОЛ -->
  <div class="tab-content" id="tab-pchol">
    <div class="empty-state">
      <div class="icon">🐝</div>
      <p>Тут пока ничего нет</p>
    </div>
  </div>

  <!-- TAB: БИРГАМОТ -->
  <div class="tab-content" id="tab-birgamot">
    <div class="empty-state">
      <div class="icon">🍋</div>
      <p>Тут пока ничего нет</p>
    </div>
  </div>

  <script>
    function openTab(name) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.querySelectorAll('.theme-btn').forEach(el => el.classList.remove('active'));
      document.querySelector('.' + theme + '-btn').classList.add('active');
      localStorage.setItem('base-theme', theme);
    }

    // Restore theme
    const saved = localStorage.getItem('base-theme');
    if (saved) setTheme(saved);
  </script>
</body>
</html>
